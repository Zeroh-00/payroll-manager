<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

table{
border-collapse:collapse;
width:100%
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#1f6feb;
color:white
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
margin:2px;
cursor:pointer
}

.present{
background:#22c55e;
color:white
}

.absent{
background:#ef4444;
color:white
}

.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap
}

.box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
flex:1
}

</style>

</head>

<body>

<h2>Cloud Payroll Manager</h2>

<div class="dashboard">

<div class="box">
<h3>Total Workers</h3>
<div id="totalWorkers">0</div>
</div>

<div class="box">
<h3>Total Payroll</h3>
<div id="totalPayroll">0</div>
</div>

<div class="box">
<h3>Total Advances</h3>
<div id="totalAdvance">0</div>
</div>

</div>

<div class="card">

<h3>Add Worker</h3>

<input id="name" placeholder="Worker Name">
<input id="wage" placeholder="Daily Wage">

<button onclick="addWorker()">Add Worker</button>

</div>

<div class="card">

<h3>Workers</h3>

<table id="workers">

<tr>
<th>Name</th>
<th>Wage</th>
<th>Attendance</th>
</tr>

</table>

</div>

<div class="card">

<h3>Add Adjustment</h3>

<select id="workerSelect"></select>

<select id="type">
<option>Bonus</option>
<option>Advance</option>
</select>

<input id="amount" placeholder="Amount">

<button onclick="addAdjustment()">Save</button>

</div>

<script>

/* ---------------- Firebase Config ---------------- */

const firebaseConfig = {
  apiKey: "PASTE_KEY_HERE",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* ---------------- Add Worker ---------------- */

function addWorker(){

let name=document.getElementById("name").value
let wage=parseFloat(document.getElementById("wage").value)

db.collection("workers").add({
name:name,
wage:wage
})

}

/* ---------------- Attendance Button ---------------- */

function attendanceButton(worker){

let btn=document.createElement("button")
btn.innerText="Present"

btn.onclick=function(){

db.collection("attendance").add({
worker:worker,
date:new Date()
})

}

return btn

}

/* ---------------- Add Adjustment ---------------- */

function addAdjustment(){

let worker=document.getElementById("workerSelect").value
let type=document.getElementById("type").value
let amount=parseFloat(document.getElementById("amount").value)

db.collection("adjustments").add({
worker:worker,
type:type,
amount:amount
})

}

/* ---------------- Load Workers ---------------- */

db.collection("workers").onSnapshot(snapshot=>{

let table=document.getElementById("workers")

table.innerHTML="<tr><th>Name</th><th>Wage</th><th>Attendance</th></tr>"

document.getElementById("workerSelect").innerHTML=""

snapshot.forEach(doc=>{

let w=doc.data()

let row=table.insertRow()

row.insertCell().innerText=w.name
row.insertCell().innerText=w.wage

let cell=row.insertCell()

cell.appendChild(attendanceButton(w.name))

let opt=document.createElement("option")
opt.text=w.name

workerSelect.appendChild(opt)

})

document.getElementById("totalWorkers").innerText=snapshot.size

})

</script>
